<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=Zen+Maru+Gothic:wght@500;700;900&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,800;1,9..144,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --cream: #F5EDE0;
    --cream-deep: #ECE0CD;
    --terra: #C8553D;
    --terra-deep: #A2412E;
    --forest: #3A4D39;
    --forest-deep: #2A3A2A;
    --mustard: #E8B04B;
    --ink: #1F2A1E;
    --paper: #FBF7EE;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: "Zen Kaku Gothic New", system-ui, sans-serif;
    background: var(--cream);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    line-height: 1.7;
    overflow-x: hidden;
  }

  /* Subtle paper texture via gradient noise */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(200,85,61,0.04), transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(58,77,57,0.05), transparent 50%);
    z-index: 0;
  }

  .display { font-family: "Fraunces", "Zen Kaku Gothic New", serif; font-optical-sizing: auto; }
  .mono { font-family: "DM Mono", ui-monospace, monospace; }
  .maru { font-family: "Zen Maru Gothic", "Zen Kaku Gothic New", sans-serif; }

  ::selection { background: var(--terra); color: var(--paper); }

  /* Hand-drawn underline */
  .squiggle {
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 8'><path d='M2 5 Q 15 1 30 4 T 60 4 T 90 4 T 118 4' stroke='%23C8553D' stroke-width='2.5' fill='none' stroke-linecap='round'/></svg>");
    background-repeat: no-repeat;
    background-position: 0 100%;
    background-size: 100% 8px;
    padding-bottom: 10px;
  }

  /* Tape effect */
  .tape {
    position: relative;
  }
  .tape::before {
    content: "";
    position: absolute;
    top: -14px;
    left: 50%;
    transform: translateX(-50%) rotate(-3deg);
    width: 90px;
    height: 22px;
    background: rgba(232, 176, 75, 0.55);
    box-shadow: 0 1px 2px rgba(0,0,0,0.08);
  }

  /* Buttons */
  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    background: var(--terra);
    color: var(--paper);
    padding: 18px 32px;
    border-radius: 999px;
    font-weight: 700;
    text-decoration: none;
    box-shadow: 4px 4px 0 var(--forest-deep);
    transition: transform .15s ease, box-shadow .15s ease;
    border: none;
    font-size: 17px;
    cursor: pointer;
  }
  .btn-primary:hover {
    transform: translate(-2px, -2px);
    box-shadow: 6px 6px 0 var(--forest-deep);
  }
  .btn-primary:active {
    transform: translate(2px, 2px);
    box-shadow: 1px 1px 0 var(--forest-deep);
  }

  /* Marquee */
  @keyframes scroll-x {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }
  .marquee-track {
    display: flex;
    gap: 48px;
    width: max-content;
    animation: scroll-x 40s linear infinite;
  }

  /* Floating */
  @keyframes float-y {
    0%, 100% { transform: translateY(0) rotate(var(--rot, 0deg)); }
    50% { transform: translateY(-8px) rotate(var(--rot, 0deg)); }
  }
  .float { animation: float-y 4s ease-in-out infinite; }

  /* Polaroid */
  .polaroid {
    background: var(--paper);
    padding: 14px 14px 48px;
    box-shadow:
      0 1px 2px rgba(0,0,0,0.06),
      0 12px 28px rgba(31,42,30,0.18);
    transition: transform .3s ease;
  }
  .polaroid:hover { transform: scale(1.02) rotate(0deg) !important; }

  .photo-placeholder {
    width: 100%;
    aspect-ratio: 4 / 5;
    background:
      linear-gradient(135deg, rgba(58,77,57,0.18), rgba(200,85,61,0.18)),
      var(--cream-deep);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--forest);
    font-size: 13px;
    text-align: center;
    padding: 16px;
    line-height: 1.5;
    position: relative;
    overflow: hidden;
  }
  .photo-placeholder::after {
    content: "";
    position: absolute;
    inset: 12px;
    border: 1.5px dashed rgba(58,77,57,0.3);
  }
  .photo-placeholder span {
    position: relative;
    z-index: 1;
    background: rgba(251,247,238,0.85);
    padding: 6px 12px;
    border-radius: 4px;
    font-family: "DM Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.05em;
  }

  /* Big number cards */
  .stat-num {
    font-family: "Fraunces", serif;
    font-weight: 800;
    line-height: 0.9;
    letter-spacing: -0.02em;
  }

  /* Section dividers - wavy */
  .wave-divider {
    height: 24px;
    width: 100%;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 80 24' preserveAspectRatio='none'><path d='M0 12 Q 20 0 40 12 T 80 12 L 80 24 L 0 24 Z' fill='%233A4D39'/></svg>");
    background-size: 80px 24px;
    background-repeat: repeat-x;
  }

  /* Sticker */
  .sticker {
    display: inline-block;
    background: var(--mustard);
    color: var(--ink);
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.05em;
    border: 2px solid var(--ink);
    box-shadow: 2px 2px 0 var(--ink);
  }

  .anchor-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--paper);
    border: 1.5px solid var(--forest);
    color: var(--forest);
    padding: 8px 18px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
    text-decoration: none;
    transition: all .15s ease;
  }
  .anchor-pill:hover { background: var(--forest); color: var(--paper); }

  /* Reveal on scroll */
  .reveal {
    opacity: 0;
    transform: translateY(24px);
    transition: opacity .8s ease, transform .8s ease;
  }
  .reveal.in {
    opacity: 1;
    transform: translateY(0);
  }

  /* Anchor offset */
  section { scroll-margin-top: 24px; }

  /* Mobile tweaks for narrow screens */
  @media (max-width: 720px) {
    .hero-headline { font-size: 56px !important; }
    .section-title { font-size: 40px !important; }
    .stat-num.huge { font-size: 80px !important; }
  }
</style>
</head>
